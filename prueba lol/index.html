<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modelo Minecraft saltando</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="scene">
    <div class="shadow"></div>

    <div class="character" id="character">
      <div class="part head">
        <div class="hair-front"></div>
        <div class="hair-side"></div>
        <div class="hair-lock"></div>

        <div class="flower">
          <div class="petal p1"></div>
          <div class="petal p2"></div>
          <div class="petal p3"></div>
          <div class="petal p4"></div>
          <div class="center"></div>
        </div>

        <div class="face">
          <div class="eyebrow left"></div>
          <div class="eyebrow right"></div>
          <div class="eye left"></div>
          <div class="eye right"></div>
          <div class="mouth"></div>
        </div>
      </div>

      <div class="part neck"></div>

      <div class="part arm left">
        <div class="hand"></div>
      </div>

      <div class="part arm right">
        <div class="hand"></div>
      </div>

      <div class="part body">
        <div class="torso"></div>

        <div class="chest-area">
          <div class="breast left" id="breastLeft"></div>
          <div class="breast right" id="breastRight"></div>
        </div>

        <div class="collar"></div>

        <div class="waist">
          <div class="navel"></div>
        </div>
      </div>

      <div class="part hips"></div>

      <div class="part leg left">
        <div class="shoe"></div>
      </div>

      <div class="part leg right">
        <div class="shoe"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
